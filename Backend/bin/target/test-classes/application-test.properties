## Test-only configuration that swaps MySQL for an in-memory H2 database.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

application.security.jwt.secret-key=VGhpc0lzQVNlY3VyZVN1cGVyTG9uZ0p3dFNlY3JldEtleUZvckRlbW9QdXJwb3Nlc0luT25seQ==
application.security.jwt.expiration=86400000

application.security.api-keys=test-user-key:USER,test-admin-key:ADMIN
